name: Build Test

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}-${{ matrix.tag }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
        tag:
          - openwrt-24.10
          - openwrt-25.12

    steps:
      - name: Compute ARCH / effective arch
        run: |
          echo "SKIP_BUILD=0" >> $GITHUB_ENV
          mkdir 123
          echo $(date) > 123/123.txt
          if [ "${{ matrix.tag }}" = "openwrt-25.12" ] && [ "${{ matrix.arch }}" = "riscv64_riscv64" ]; then
            echo "EFFECTIVE_ARCH=riscv64_generic" >> $GITHUB_ENV
            echo "ARCH=riscv64_generic-${{ matrix.tag }}" >> $GITHUB_ENV
          elif [ "${{ matrix.tag }}" = "openwrt-25.12" ] && [ "${{ matrix.arch }}" = "mips_4kec" ]; then
            echo "SKIP_BUILD=1" >> $GITHUB_ENV
          else
            echo "EFFECTIVE_ARCH=${{ matrix.arch }}" >> $GITHUB_ENV
            echo "ARCH=${{ matrix.arch }}-${{ matrix.tag }}" >> $GITHUB_ENV
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.ARCH }}
          path: ${{ env.ARCH }}.tar.gz

      - name: Upload files to FTP
        if: ${{ env.SKIP_BUILD == '0' }}
        uses: matteodf/lftp-upload@v1
        with:
          host: ${{ secrets.ftp_address }}
          username: ${{ secrets.ftp_username }}
          password: ${{ secrets.ftp_password }}
          forceSsl: "false"
          localDir: 123/
          remoteDir: ${{ matrix.tag }}/${{ env.EFFECTIVE_ARCH }}/
          timeout: "120"
          retries: "5"
          multiplier: "2.0"
          baseInterval: "10"
          pConn: "10"
